<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پنل مدیریت مشتریان</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <main class="container">

    <section class="card">
      <h1>پنل مدیریت مشتریان</h1>
      <p class="muted">ثبت، ویرایش و حذف اطلاعات مشتریان</p>
    </section>

    <section class="card">
      <h2>ثبت / ویرایش مشتری</h2>

      <form id="customerForm">
        <input type="hidden" id="editingToken" />

        <div class="form-grid">
          <div class="field">
            <label for="name">نام مشتری</label>
            <input id="name" type="text" placeholder="مثلاً علی رضایی" required />
          </div>

          <div class="field">
            <label for="total_mb">حجم کل بر حسب MB</label>
            <input id="total_mb" type="number" min="0" placeholder="مثلاً 51200" required />
          </div>

          <div class="field">
            <label for="used_mb">حجم مصرف‌شده بر حسب MB</label>
            <input id="used_mb" type="number" min="0" placeholder="مثلاً 10240" value="0" />
          </div>

          <div class="field">
            <label for="expire_date">تاریخ انقضا</label>
            <input id="expire_date" type="text" placeholder="مثلاً 1405/03/01" />
          </div>

          <div class="field">
            <label for="status">وضعیت</label>
            <select id="status">
              <option value="active">فعال</option>
              <option value="inactive">غیرفعال</option>
            </select>
          </div>

          <div class="field full">
            <label for="note">یادداشت</label>
            <textarea id="note" rows="3" placeholder="یادداشت اختیاری"></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="submitBtn">ثبت مشتری</button>
          <button type="button" id="cancelEditBtn" class="hidden">لغو ویرایش</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>لیست مشتریان</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>نام</th>
              <th>حجم کل</th>
              <th>مصرف‌شده</th>
              <th>باقی‌مانده</th>
              <th>انقضا</th>
              <th>وضعیت</th>
              <th>لینک</th>
              <th>عملیات</th>
            </tr>
          </thead>

          <tbody id="customersTableBody">
            <tr>
              <td colspan="8">در حال دریافت اطلاعات...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="/app.js" defer></script>
</body>
</html>
