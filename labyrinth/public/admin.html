<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پنل ادمین | Silent Labyrinth</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="admin-body">

  <div class="admin-wrapper">
    <header class="admin-header">
      <div>
        <h1>پنل مدیریت مشتریان</h1>
        <p>ثبت، ویرایش و مدیریت حجم سرویس‌ها</p>
      </div>
      <a href="/" class="back-home">صفحه اصلی</a>
    </header>

    <section class="admin-card">
      <h2>ثبت / ویرایش مشتری</h2>

      <form id="customerForm" class="admin-form">
        <input type="hidden" id="editingToken" />

        <div class="form-grid">
          <div class="form-group">
            <label>نام مشتری</label>
            <input id="name" type="text" placeholder="مثلاً علی رضایی" required />
          </div>

          <div class="form-group">
            <label>حجم کل - MB</label>
            <input id="total_mb" type="number" placeholder="مثلاً 51200" required />
          </div>

          <div class="form-group">
            <label>حجم مصرف‌شده - MB</label>
            <input id="used_mb" type="number" placeholder="مثلاً 10240" required />
          </div>

          <div class="form-group">
            <label>تاریخ انقضا</label>
            <input id="expire_date" type="text" placeholder="مثلاً 1405/03/20" />
          </div>

          <div class="form-group">
            <label>وضعیت</label>
            <select id="status">
              <option value="active">فعال</option>
              <option value="inactive">غیرفعال</option>
            </select>
          </div>

          <div class="form-group full">
            <label>یادداشت</label>
            <textarea id="note" placeholder="توضیحات اختیاری"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button id="submitBtn" type="submit" class="primary-btn">ثبت مشتری</button>
          <button id="cancelEditBtn" type="button" class="secondary-btn" style="display:none;">لغو ویرایش</button>
        </div>
      </form>
    </section>

    <section class="admin-card">
      <h2>لیست مشتریان</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>نام</th>
              <th>حجم کل</th>
              <th>مصرف‌شده</th>
              <th>باقی‌مانده</th>
              <th>انقضا</th>
              <th>وضعیت</th>
              <th>لینک</th>
              <th>ویرایش</th>
              <th>حذف</th>
            </tr>
          </thead>
          <tbody id="customersTableBody"></tbody>
        </table>
      </div>
    </section>

    <footer class="made-by">Made by Alirez∆</footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
