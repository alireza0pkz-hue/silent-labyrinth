<script>
  const PROJECT_NAME = "Labyrinth Panel";

  const $ = (id) => document.getElementById(id);

  function toFaNumber(value) {
    return new Intl.NumberFormat("fa-IR").format(value);
  }

  function toNumber(value) {
    if (value === undefined || value === null || value === "") return 0;
    if (typeof value === "number") return isNaN(value) ? 0 : value;

    const cleaned = String(value).replace(/[^\d.]/g, "");
    return Number(cleaned) || 0;
  }

  function formatMB(mb) {
    mb = toNumber(mb);

    if (mb >= 1024 * 1024) {
      return `${toFaNumber((mb / 1024 / 1024).toFixed(2))} TB`;
    }

    if (mb >= 1024) {
      return `${toFaNumber((mb / 1024).toFixed(2))} GB`;
    }

    return `${toFaNumber(mb)} MB`;
  }

  function normalizeCustomer(data) {
    return data.customer || data.data || data;
  }

  function setStatus(status) {
    const pill = $("statusPill");
    const text = $("statusText");
    const normalized = String(status || "active").toLowerCase();

    if (normalized === "active" || normalized === "فعال") {
      text.textContent = "سرویس فعال";
      pill.style.background = "rgba(34,197,94,0.12)";
      pill.style.borderColor = "rgba(34,197,94,0.25)";
      pill.style.color = "#86efac";
    } else {
      text.textContent = "سرویس غیرفعال";
      pill.style.background = "rgba(239,68,68,0.12)";
      pill.style.borderColor = "rgba(239,68,68,0.28)";
      pill.style.color = "#fca5a5";
    }
  }

  function setProgress(percent) {
    const ring = $("ring");
    const safePercent = Math.max(0, Math.min(100, Math.round(percent)));

    $("remainPercent").textContent = toFaNumber(safePercent);
    ring.style.setProperty("--percent", safePercent);

    if (safePercent >= 60) {
      ring.style.background = `conic-gradient(#22c55e ${safePercent}%, rgba(51,65,85,0.65) 0)`;
      $("progressTitle").textContent = "وضعیت عالیه";
      $("progressDesc").textContent = "هنوز حجم مناسبی از سرویس شما باقی مانده است.";
    } else if (safePercent >= 25) {
      ring.style.background = `conic-gradient(#f59e0b ${safePercent}%, rgba(51,65,85,0.65) 0)`;
      $("progressTitle").textContent = "مصرف متوسط";
      $("progressDesc").textContent = "بهتره مصرف سرویس رو زیر نظر داشته باشید.";
    } else {
      ring.style.background = `conic-gradient(#ef4444 ${safePercent}%, rgba(51,65,85,0.65) 0)`;
      $("progressTitle").textContent = "حجم رو به اتمامه";
      $("progressDesc").textContent = "حجم باقی‌مانده کم است و بهتره تمدید یا شارژ شود.";
    }
  }

  async function loadCustomer() {
    try {
      $("projectName").textContent = PROJECT_NAME;

      const token = decodeURIComponent(location.pathname.replace(/^\/+|\/+$/g, ""));

      if (!token || token === "index.html") {
        throw new Error("توکن مشتری در لینک وجود ندارد.");
      }

      const res = await fetch(`/api/customer/${encodeURIComponent(token)}`, {
        method: "GET",
        headers: {
          "Accept": "application/json"
        }
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        throw new Error(data.error || data.message || "اطلاعات مشتری پیدا نشد.");
      }

      const customer = normalizeCustomer(data);

      const name = customer.name || customer.customer_name || "مشتری";

      const total =
        toNumber(customer.totalVolume) ||
        toNumber(customer.total_mb) ||
        toNumber(customer.total) ||
        toNumber(customer.volume) ||
        toNumber(customer.limit) ||
        toNumber(customer.dataLimit);

      const used =
        toNumber(customer.usedVolume) ||
        toNumber(customer.used_mb) ||
        toNumber(customer.used) ||
        toNumber(customer.consumed) ||
        toNumber(customer.usedTraffic);

      let remain =
        toNumber(customer.remainingVolume) ||
        toNumber(customer.remaining_mb) ||
        toNumber(customer.remaining) ||
        toNumber(customer.left) ||
        toNumber(customer.remainingTraffic);

      if (!remain && total > 0) {
        remain = Math.max(total - used, 0);
      }

      const percentRemain = total > 0 ? (remain / total) * 100 : 0;

      $("customerName").textContent = name;

      $("totalBox").textContent = formatMB(total);
      $("usedBox").textContent = formatMB(used);
      $("remainBox").textContent = formatMB(remain);

      $("totalDetail").textContent = formatMB(total);
      $("usedDetail").textContent = formatMB(used);
      $("remainDetail").textContent = formatMB(remain);

      $("expireBox").textContent =
        customer.expire_date ||
        customer.expire ||
        customer.expireDate ||
        customer.expiry ||
        "unlimited";

      $("noteBox").textContent =
        customer.note || customer.description || "یادداشتی ثبت نشده است.";

      setStatus(customer.status);
      setProgress(percentRemain);

      $("updatedAt").textContent = new Date().toLocaleString("fa-IR");

      $("loading").classList.add("hidden");
      $("app").classList.remove("hidden");
    } catch (err) {
      $("loading").classList.add("hidden");
      $("errorBox").classList.remove("hidden");
      $("errorText").textContent = err.message || "خطای ناشناخته در دریافت اطلاعات.";
    }
  }

  loadCustomer();
</script>
